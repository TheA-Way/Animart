services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: animart_user
      POSTGRES_PASSWORD: animart_password
      POSTGRES_DB: animart_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U animart_user -d animart_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://animart_user:animart_password@db/animart_db
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: